name: Generate Proto Files

on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout generator repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
       with:
        go-version: '1.22'

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Check protoc version
        run: protoc --version

      - name: Install Go plugin
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Clone proto repository
        run: |
          git clone https://github.com/Bekbolat77/user-service-protos.git
      - name: Generate Go code
        run: |
          protoc \
            --proto_path=user-service-protos/proto \
            --go_out=. \
            user-service-protos/proto/user.proto
            
      - name: Remove cloned repo before commit
        run: |
          rm -rf user-service-protos
      - name: Commit and push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Generate protobuf Go files" || echo "No changes to commit"
          git push
